<div class="page">
  <!-- Header -->
  <header class="header">
    <div class="header__overlay"></div>
    <div class="header__content">
      <h1>Registered Competitors</h1>
    </div>
  </header>

  <!-- Filters Section -->
  <section class="filters">
    <div class="filter-title">
      <mat-icon>filter_list</mat-icon>
      <h3>Filter Competitors</h3>
    </div>

    <div class="filter-card">
      <div class="filter-grid">
        <!-- First Name -->
        <div class="filter-block">
          <label>First Name</label>
          <input
            type="text"
            placeholder="Search by name..."
            [ngModel]="firstNameFilter()"
            (input)="onFirstNameChange($event.target.value)"
          />
        </div>

        <!-- Last Name -->
        <div class="filter-block">
          <label>Last Name</label>
          <input
            type="text"
            placeholder="Search by surname..."
            [ngModel]="lastNameFilter()"
            (input)="onLastNameChange($event.target.value)"
          />
        </div>

        <!-- Belt -->
        <div class="filter-block">
          <label>Belt</label>
          <select [ngModel]="beltFilter()" (change)="onBeltChange($any($event).target.value)">
            <option>All Belts</option>
            <option *ngFor="let belt of uniqueBelts()">{{ belt }}</option>
          </select>
        </div>

        <!-- Club -->
        <div class="filter-block">
          <label>Club</label>
          <select [ngModel]="clubFilter()" (change)="onClubChange($any($event).target.value)">
            <option>All Clubs</option>
            <option *ngFor="let club of uniqueClubs()">{{ club }}</option>
          </select>
        </div>

      </div>
    </div>
  </section>

  <!-- Add Contestant Button -->
  <div class="action-bar">
    <button mat-raised-button color="primary" class="add-contestant-btn" (click)="onAddContestant()">
      <mat-icon>add</mat-icon>
      Add Contestant
    </button>
  </div>

  <!-- Contestants Table -->
  <main class="content">
    <div class="content__top">
      <p class="muted">
        Showing {{ filteredContestants().length }}
        competitor{{ filteredContestants().length === 1 ? "" : "s" }}
      </p>
    </div>

    <div class="table-wrapper">
      <table class="contestants-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Club</th>
                <th>Belt</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let contestant of filteredContestants()">
            <td class="name">{{ getFullName(contestant) }}</td>
            <td>{{ contestant.club }}</td>
            <td>
              <span class="belt-badge" [ngClass]="contestant.belt.toLowerCase()">
                {{ contestant.belt }}
              </span>
            </td>
            <td class="actions">
              <button
                mat-icon-button
                matTooltip="Edit"
                (click)="onEditContestant(contestant)"
                class="edit-btn"
              >
                <mat-icon>edit</mat-icon>
              </button>
              <button
                mat-icon-button
                matTooltip="Delete"
                (click)="onDeleteContestant(contestant)"
                class="delete-btn"
              >
                <mat-icon>delete</mat-icon>
              </button>
            </td>
          </tr>
        </tbody>
      </table>

      <div *ngIf="filteredContestants().length === 0" class="empty-state">
        <mat-icon>person_search</mat-icon>
        <p>No competitors found</p>
      </div>
    </div>
  </main>
</div>
