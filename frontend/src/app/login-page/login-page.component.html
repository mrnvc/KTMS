<div class="login-page">
  <!-- Header -->
  <div class="header">
    <div class="header-bg">
      <img src="https://images.unsplash.com/photo-1555597673-b21d5c935865?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&q=80&w=1080" alt="Karate dojo" class="header-img" />
    </div>
    <div class="header-content">
      <button class="back-button" (click)="onBack()">
        &#8592; Back to Home
      </button>
      <div class="logo">
        <div class="logo-icon">空</div>
        <span>KTMS</span>
      </div>
    </div>
  </div>

  <!-- Login Form -->
  <div class="login-form-container">
    <div class="card">
      <div class="card-header">
        <h2>Welcome Back</h2>
        <p>Sign in to your account</p>
      </div>

      <div class="card-content">
        <form (ngSubmit)="handleSubmit()">
          <!-- Email -->
          <div class="form-group">
            <label for="email">Email or Username</label>
            <div class="input-wrapper">
              <span class="icon">@</span>
              <input type="text" id="email" [(ngModel)]="email" name="email" placeholder="Enter your email or username" required>
            </div>
          </div>

          <!-- Password -->
          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrapper">
              <span class="icon">🔒</span>
              <input [type]="showPassword ? 'text' : 'password'" id="password" [(ngModel)]="password" name="password" placeholder="Enter your password" required>
              <button type="button" class="toggle-password" (click)="togglePassword()">
                {{ showPassword ? '🙈' : '👁️' }}
              </button>
            </div>
          </div>

          <!-- Remember Me -->
          <div class="form-actions">
            <label>
              <input type="checkbox" [(ngModel)]="rememberMe" name="rememberMe">
              Remember me
            </label>
            <a href="#forgot-password">Forgot password?</a>
          </div>

          <!-- Submit -->
          <button type="submit" class="btn-primary">Sign In</button>

          <!-- Social Login -->
          <div class="social-login">
            <button type="button" class="btn-outline">Google</button>
            <button type="button" class="btn-outline">Facebook</button>
          </div>

          <!-- Sign up -->
          <p class="signup-text">
            Don't have an account?
            <a href="#register">Sign up here</a>
          </p>
        </form>
      </div>

      <!-- Demo Access -->
      <div class="demo-access">
        <span>ℹ️</span>
        Use <strong>demo@ktms.com</strong>/<strong>demo123</strong> to explore
      </div>
    </div>
  </div>
</div>
